  <text x="80" y="500" font-family="system-ui, -apple-system, sans-serif" font-size="20" fill="#64748b">• 10 rubros médicos</text>
  <text x="80" y="535" font-family="system-ui, -apple-system, sans-serif" font-size="20" fill="#64748b">• Honduras y LATAM</text>
